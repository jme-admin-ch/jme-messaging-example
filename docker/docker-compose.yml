services:
  broker:
    image: confluentinc/cp-kafka:7.9.8
    hostname: broker
    ports:
      - "9092:9092"
    volumes:
      - ./kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf
    environment:
      # KRaft mode settings
      KAFKA_BROKER_ID: 1
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      # KRaft cluster ID - format properly, a 22-character base64-encoded string, for the confluent platform
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Authentication
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      # Temporary storage settings
      KAFKA_LOG_DIRS: /tmp/kafka-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  broker_init:
    image: confluentinc/cp-kafka:7.9.8
    command: "kafka-configs --bootstrap-server broker:29092 --alter --add-config 'SCRAM-SHA-512=[password=user-secret]' --entity-type users --entity-name user"
    depends_on:
      - broker

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    hostname: schema-registry
    depends_on:
      - broker
      - broker_init
    ports:
      - "7781:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://broker:29092

  jeap-error-handling-service-db-local:
    image: postgres:17.7
    ports:
      - "5532:5432"
    environment:
      - POSTGRES_USER=errorhandling
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=jeap-error-handling-service-db-local

  jme-receiverpublisher-outbox-local:
    image: postgres:17.7
    ports:
      - "5533:5432"
    environment:
      - POSTGRES_USER=receiverpublisher-outbox
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=jme-receiverpublisher-outbox-db-local

  jme-sequential-inbox-local:
    image: postgres:17.7
    ports:
      - "5534:5432"
    environment:
      - POSTGRES_USER=sequential-inbox
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=jme-sequential-inbox-db-local
